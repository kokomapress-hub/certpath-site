<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you — CertPath Publishing</title>
  <link rel="icon" type="image/png" href="/img/logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=7">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg class="logo-shield" viewBox="0 0 40 40" width="36" height="36" aria-hidden="true"><path fill="#1B2A4A" d="M6 4h22l6 6v20l-14 6L6 30V4z"/><rect x="12" y="14" width="16" height="3" fill="#fff"/><rect x="12" y="20" width="16" height="3" fill="#fff"/></svg>
        <span class="logo-text">CertPath <span class="gold">Publishing</span></span>
      </a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/access" class="btn-nav">Access Tests</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 3rem 2rem 5rem; max-width: 700px;">
    <div class="form-card" id="resultCard">
      <div style="text-align:center; padding: 1.5rem 0;">
        <div style="font-size: 3rem;">⏳</div>
        <h2 style="margin-top: 1rem;">Verifying your payment…</h2>
        <p style="color: var(--gray-500); margin-top: 0.5rem;">Just a moment.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom" style="border: none; padding: 2rem;">
      <p>&copy; 2025 CertPath Publishing. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (async () => {
      const card = document.getElementById('resultCard');
      const sid = new URLSearchParams(location.search).get('session_id');

      if (!sid) {
        card.innerHTML = `
          <h2>No session found</h2>
          <p>This page is shown after a successful checkout. If you were redirected here without completing a payment, please start again from <a href="/">the home page</a>.</p>`;
        return;
      }

      try {
        const r = await fetch('/api/verify-session?session_id=' + encodeURIComponent(sid));
        const data = await r.json();

        if (!r.ok || !data.success) {
          card.innerHTML = `
            <h2>Payment not completed</h2>
            <p>${data.error || 'We could not verify your payment.'} If you were charged, email <a href="mailto:orders@certpathpublishing.store">orders@certpathpublishing.store</a> with your receipt and we will fix it within 24 hours.</p>
            <a href="/" class="btn btn-outline" style="display:inline-block; margin-top: 1rem;">Back to home</a>`;
          return;
        }

        const productLabel = data.product === 'ebook' ? 'E-book' : 'Formula Cheat Sheet';
        const priceStr = '$' + data.amount.toFixed(2) + ' ' + (data.currency || 'USD').toUpperCase();
        const download = data.downloadUrl
          ? `<a href="${data.downloadUrl}" class="btn btn-block btn-navy" download>Download Your ${productLabel} (PDF)</a>`
          : `<p>Your download will arrive by email within a few minutes. If not, email <a href="mailto:orders@certpathpublishing.store">orders@certpathpublishing.store</a>.</p>`;

        card.innerHTML = `
          <div style="text-align:center; padding: 1rem 0 1.5rem;">
            <div style="font-size: 3rem; color: var(--success);">✓</div>
            <h2 style="margin-top: 0.75rem;">Thank you!</h2>
            <p style="color: var(--gray-500); margin-top: 0.5rem;">Your payment of <strong>${priceStr}</strong> was successful.</p>
          </div>
          <div style="background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 8px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;">
            <div style="font-size: 0.85rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 0.5rem;">Order</div>
            <div style="font-size: 1.1rem; font-weight: 700; color: var(--navy);">${data.title || data.book}</div>
            <div style="color: var(--gray-500); margin-top: 0.25rem;">${productLabel}${data.email ? ' · ' + data.email : ''}</div>
          </div>
          ${download}
          <p style="color: var(--gray-500); font-size: 0.9rem; margin-top: 1.25rem;">
            A receipt has been sent to your email. Save this page or bookmark your download link — you can return here any time using the confirmation email.
          </p>
          <a href="/" class="btn btn-outline" style="margin-top: 0.75rem;">Back to home</a>`;
      } catch (err) {
        card.innerHTML = `
          <h2>Something went wrong</h2>
          <p>We couldn't verify your session. If you completed payment, email <a href="mailto:orders@certpathpublishing.store">orders@certpathpublishing.store</a> with your receipt.</p>`;
      }
    })();
  </script>

  <script src="/js/floating-unlock.js"></script>
</body>
</html>
